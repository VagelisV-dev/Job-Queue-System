version: "3.9"

services:
  api:
    build:
      context: .
    command: ["sh", "./wait-for-db.sh", "db", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - db

  worker:
    build:
      context: .
    command: python app/worker.py
    volumes:
      - .:/app
    depends_on:
      - redis
      - db

  redis:
    image: redis:7

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: jobs
    ports:
      - "5432:5432"